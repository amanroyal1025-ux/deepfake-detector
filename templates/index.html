<!DOCTYPE html>
<html>
<head>
    <title>Deepfake Detector</title>
</head>
<body>
    <h1>🎭 Deepfake Detection System</h1>

    <form action="/predict" method="post" enctype="multipart/form-data">
        <input type="file" name="file" required>
        <button type="submit">Check</button>
    </form>

    {% if result %}
        <h2>{{ result }}</h2>
    {% endif %}
</body>
</html>
